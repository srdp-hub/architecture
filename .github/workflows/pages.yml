# Build and deploy Quarto website (homepage) + LikeC4 SPA (/c4) to GitHub Pages
name: Deploy Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_call:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in
# progress and the latest queued. Do NOT cancel in-progress runs so that
# production deployments are always completed.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Validate LikeC4 model following our rules
  # @see test/validate-model.spec.ts
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate
        run: bun run test

  # Build job: Quarto (homepage) + LikeC4 (/c4) → _site/
  build-pages:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      # ── Quarto ──────────────────────────────────────────────────────────────
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # Install Typst so the PDF format works in CI
          tinytex: false

      - name: Render Quarto book
        # Outputs to _site/ (configured via output-dir in arc42/_quarto.yml)
        run: quarto render arc42

      # ── LikeC4 ──────────────────────────────────────────────────────────────
      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build LikeC4 SPA
        # base_path is e.g. /plugin-c4-software-architecture for project pages,
        # or / for custom domains. LikeC4 lives under /c4 relative to the site root.
        run: |
          BASE="${{ steps.pages.outputs.base_path || '/' }}"
          # Ensure base ends without trailing slash before appending /c4
          BASE="${BASE%/}"
          bunx likec4@latest build \
            --base "${BASE}/c4" \
            --output _site/c4

      # ── Upload combined artifact ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
